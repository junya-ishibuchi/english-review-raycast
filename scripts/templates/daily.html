<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Review – {{date}}</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <div class="container">
    <h1>English Review</h1>
    <p class="subtitle">{{date}}</p>

    <div class="stats">
      <div class="stat-card active" data-filter="all">
        <div class="number">{{count}}</div>
        <div class="label">Total</div>
      </div>
      <div class="stat-card" data-filter="correction">
        <div class="number">{{correctionCount}}</div>
        <div class="label">Corrections</div>
      </div>
      <div class="stat-card" data-filter="translation">
        <div class="number">{{translationCount}}</div>
        <div class="label">Translations</div>
      </div>
      <div class="stat-card" data-filter="toJapanese">
        <div class="number">{{toJapaneseCount}}</div>
        <div class="label">To Japanese</div>
      </div>
    </div>

    <div class="section-title">Records</div>

    {{records}}
  </div>

  <script>
    // Read state
    const STORAGE_KEY = 'english-review-read';
    function getReadIds() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function saveReadIds(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }
    function markAsRead(id) {
      const ids = getReadIds();
      if (!ids.includes(id)) { ids.push(id); saveReadIds(ids); }
    }

    // Apply read state on load
    const readIds = getReadIds();
    document.querySelectorAll('.record-card').forEach(card => {
      if (readIds.includes(card.dataset.id)) {
        card.classList.add('read', 'collapsed');
      }
    });

    // Filter
    document.querySelectorAll('.stat-card[data-filter]').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        const filter = card.dataset.filter;
        document.querySelectorAll('.record-card').forEach(rec => {
          rec.style.display = (filter === 'all' || rec.classList.contains(filter)) ? '' : 'none';
        });
      });
    });

    // Card-level collapse/expand (click header)
    document.querySelectorAll('.record-header').forEach(header => {
      header.addEventListener('click', () => {
        const card = header.closest('.record-card');
        const wasExpanded = !card.classList.contains('collapsed');
        card.classList.toggle('collapsed');

        // Collapsing → mark as read
        if (wasExpanded) {
          markAsRead(card.dataset.id);
          card.classList.add('read');
        }
      });
    });

    // Sentence-level collapse/expand
    document.querySelectorAll('.sentence-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        header.parentElement.classList.toggle('collapsed');
      });
    });
  </script>
</body>
</html>
